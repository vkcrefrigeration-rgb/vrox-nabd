<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VROX KING - Nabd</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0A0E17;color:#EDF2F4;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:100%;max-width:480px;padding:20px}
.login-box,.dashboard{display:none}
.login-box.active,.dashboard.active{display:block}
.login-box{text-align:center}
.login-box h1{font-size:28px;font-weight:900;color:#00B4D8;margin-bottom:2px}
.login-box .sub{font-size:13px;color:#9B5DE5;font-weight:700;margin-bottom:28px}
.login-box input{
  display:block;width:100%;padding:12px;margin-bottom:10px;
  background:#141B2D;border:1px solid #2B2D42;border-radius:8px;
  color:#EDF2F4;font-size:14px;font-family:inherit;outline:none
}
.login-box input:focus{border-color:#00B4D8}
.login-box button{
  width:100%;padding:12px;background:#00B4D8;color:#0A0E17;
  border:none;border-radius:8px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:4px
}
.login-box .err{color:#E63946;font-size:12px;margin-top:8px}

.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.dash-header h2{font-size:18px;color:#EDF2F4}
.dash-header .logout{color:#E63946;font-size:12px;cursor:pointer;background:none;border:none;font-family:inherit}

.truck-card{
  background:linear-gradient(180deg,#141B2D,#0D1321);border:1px solid #2B2D42;
  border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:0.2s
}
.truck-card:hover{border-color:#00B4D8}
.truck-card .tname{font-size:15px;font-weight:700;color:#EDF2F4;margin-bottom:4px}
.truck-card .tinfo{font-size:11px;color:#8D99AE}
.truck-card .trow{display:flex;justify-content:space-between;margin-top:6px;font-size:12px}
.truck-card .ttemp{font-size:28px;font-weight:900;color:#00B4D8}
.truck-card .tbadge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px}
.tbadge.ok{background:rgba(46,196,182,0.15);color:#2EC4B6;border:1px solid rgba(46,196,182,0.3)}
.tbadge.warn{background:rgba(244,162,97,0.15);color:#F4A261;border:1px solid rgba(244,162,97,0.3)}
.tbadge.err{background:rgba(230,57,70,0.15);color:#E63946;border:1px solid rgba(230,57,70,0.3)}

.detail{display:none}
.detail.active{display:block}
.back-btn{color:#8D99AE;font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit;margin-bottom:12px}
.detail-temp{text-align:center;font-size:64px;font-weight:900;color:#00B4D8;margin:8px 0}
.detail-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.dinfo{background:linear-gradient(180deg,#141B2D,#0D1321);border:1px solid #2B2D42;border-radius:8px;padding:10px;text-align:center}
.dinfo .dl{font-size:9px;font-weight:700;color:#8D99AE;margin-bottom:3px}
.dinfo .dv{font-size:18px;font-weight:700;color:#EDF2F4}

.loading{text-align:center;padding:40px;color:#8D99AE;font-size:14px}
</style>
</head>
<body>
<div class="container">

  <!-- LOGIN -->
  <div class="login-box active" id="loginBox">
    <h1>VROX KING</h1>
    <div class="sub">Nabd Control System</div>
    <input type="text" id="email" placeholder="Email" value="demo@vrox.com" autocomplete="off">
    <input type="password" id="password" placeholder="Password" value="demo123">
    <button onclick="login()">Sign In</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h2 id="userName">Fleet Dashboard</h2>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
    <div id="truckList"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detailView">
    <button class="back-btn" onclick="showDashboard()">Back to Fleet</button>
    <div class="detail-temp" id="dtTemp">--.-</div>
    <div style="text-align:center;font-size:12px;color:#8D99AE" id="dtName"></div>
    <div class="detail-info">
      <div class="dinfo"><div class="dl">Plate</div><div class="dv" id="dtPlate">--.-</div></div>
      <div class="dinfo"><div class="dl">SOC</div><div class="dv" id="dtSOC">--</div></div>
      <div class="dinfo"><div class="dl">Engine</div><div class="dv" id="dtEngine">--</div></div>
      <div class="dinfo"><div class="dl">Fuel Saved</div><div class="dv" style="color:#2EC4B6" id="dtFuel">--</div></div>
      <div class="dinfo"><div class="dl">Ambient</div><div class="dv" id="dtAmb">--</div></div>
      <div class="dinfo"><div class="dl">Status</div><div class="dv" id="dtStatus" style="font-size:13px">--</div></div>
    </div>
  </div>

</div>

<script>
var API = '';

function login(){
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  fetch(API + '/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:email, password:password})
  }).then(function(r){ return r.json() }).then(function(data){
    if (data.token) {
      localStorage.setItem('nabd_token', data.token);
      localStorage.setItem('nabd_user', data.user.name);
      document.getElementById('userName').textContent = data.user.name + ' Fleet';
      document.getElementById('loginErr').textContent = '';
      document.getElementById('loginBox').classList.remove('active');
      document.getElementById('dashboard').classList.add('active');
      loadTrucks();
    } else {
      document.getElementById('loginErr').textContent = data.error || 'Login failed';
    }
  }).catch(function(e){
    document.getElementById('loginErr').textContent = 'Server offline';
  });
}

function loadTrucks(){
  document.getElementById('truckList').innerHTML = '<div class="loading">Loading...</div>';
  fetch(API + '/api/trucks', {
    headers: {'Authorization': 'Bearer ' + localStorage.getItem('nabd_token')}
  }).then(function(r){ return r.json() }).then(function(trucks){
    var html = '';
    var count = 0;
    function addCard(){
      count++;
      if (count > trucks.length) {
        document.getElementById('truckList').innerHTML = html || '<div class="loading">No trucks assigned</div>';
        return;
      }
      var t = trucks[count-1];
      fetch(API + '/api/truck/latest?id=' + t.id).then(function(r){ return r.json() }).then(function(data){
        var states = {0:'INIT',1:'IDLE',2:'CHARGING',3:'COOLING',4:'DEFROST',5:'TITAN',99:'ERROR'};
        var bc = data.state==3?'ok':(data.state==99?'err':'warn');
        var tv = data.t_box ? data.t_box.toFixed(1) : '--.-';
        html += '<div class="truck-card" onclick="showDetail(\''+t.id+'\',\''+t.name+'\')">'+
          '<div class="tname">'+t.name+'</div>'+
          '<div class="tinfo">'+t.type+' / '+t.plates+' plates</div>'+
          '<div class="trow"><div><span class="ttemp">'+tv+'</span> <span style="font-size:11px;color:#8D99AE">C</span></div>'+
          '<span class="tbadge '+bc+'">'+states[data.state]+'</span></div></div>';
        addCard();
      }).catch(function(){ addCard() });
    }
    addCard();
  }).catch(function(e){
    document.getElementById('truckList').innerHTML = '<div class="loading">Server offline</div>';
  });
}

function showDashboard(){
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('detailView').classList.remove('active');
  loadTrucks();
}

function showDetail(id, name){
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('detailView').classList.add('active');
  document.getElementById('dtName').textContent = name;
  fetch(API + '/api/truck/latest?id=' + id).then(function(r){ return r.json() }).then(function(data){
    var states = {0:'INIT',1:'IDLE',2:'CHARGING',3:'COOLING',4:'DEFROST',5:'TITAN',99:'ERROR'};
    document.getElementById('dtTemp').textContent = data.t_box ? data.t_box.toFixed(1) : '--.-';
    document.getElementById('dtPlate').textContent = data.t_plate ? data.t_plate.toFixed(1) : '--.-';
    document.getElementById('dtSOC').textContent = data.plate_soc ? Math.round(data.plate_soc)+'%' : '--';
    // Tricora shows plates + autonomy, Saryan shows engine RPM + fuel
    document.getElementById('dtEngine').textContent = data.type==='TRICORA' ? (data.plate_count||'?')+' Plates' : (data.engine_rpm > 0 ? data.engine_rpm+' RPM' : 'OFF');
    document.getElementById('dtFuel').textContent = data.type==='TRICORA' ? (data.autonomy||'--')+' hrs' : (data.fuel_saved ? data.fuel_saved.toFixed(0)+' L' : '--');
    document.getElementById('dtAmb').textContent = data.ambient ? data.ambient.toFixed(0)+'C' : '--';
    document.getElementById('dtStatus').textContent = states[data.state]||'?';
  });
}

function logout(){
  localStorage.removeItem('nabd_token');
  localStorage.removeItem('nabd_user');
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('loginBox').classList.add('active');
}

// Check if already logged in
var savedToken = localStorage.getItem('nabd_token');
if (savedToken) {
  document.getElementById('loginBox').classList.remove('active');
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('userName').textContent = (localStorage.getItem('nabd_user')||'User') + ' Fleet';
  loadTrucks();
}

// Auto-refresh dashboard
setInterval(function(){
  if (document.getElementById('dashboard').classList.contains('active')) loadTrucks();
}, 10000);
</script>
</body>
</html>
